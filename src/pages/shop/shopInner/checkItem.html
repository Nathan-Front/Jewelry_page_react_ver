<article class="modal-article">
  <div class="left-side">
    <div><img src="" alt="Main image" id="main-image-display" /></div>
    <ul id="popup-list-img"></ul>
  </div>
  <div class="right-side">
    <h4 class="article-name">Earrings</h4>
    <p>Price: <span class="article-price">0.00</span></p>
    <span>Free Shipping</span>
    <div class="right-side-count">
      <button type="button" class="decrease-count">-</button>
      <span id="item-count">1</span>
      <button type="button" class="increase-count">+</button>
    </div>
    <div class="right-side-cart-button">
      <button type="button" id="cancel-btn">Cancel</button>
      <button type="button" id="add-to-cart-btn">Add to Cart</button>
    </div>
    <ul>
      <li>
        <img
          src="./images/shop/payment/mastercard-full-svgrepo-com.svg"
          alt="mastercard"
        />
      </li>
      <li>
        <img
          src="./images/shop/payment/visa-4-logo-svgrepo-com.svg"
          alt="visa"
        />
      </li>
      <li>
        <img src="./images/shop/payment/paypal-svgrepo-com.svg" alt="paypal" />
      </li>
      <li>
        <img
          src="./images/shop/payment/amazon-pay-svgrepo-com.svg"
          alt="amazonpay"
        />
      </li>
    </ul>
  </div>
</article>
